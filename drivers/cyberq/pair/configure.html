<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; color: #222; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p  { color: #666; line-height: 1.4; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px;
            border: 1px solid #ccc; border-radius: 8px; }
    .row { display: flex; gap: 12px; }
    .row > div:first-child { flex: 3; }
    .row > div:last-child  { flex: 1; }
    .error { color: #c33; font-size: 13px; margin-top: 12px; min-height: 18px; }
    button { margin-top: 24px; width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
             color: white; background: #B5121B; border: 0; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Connect your CyberQ</h1>
  <p>Enter the IP address shown in the CyberQ's WiFi setup screen.
     For reliability, reserve a static DHCP lease for this device in your router.</p>

  <div class="row">
    <div>
      <label for="host">IP address</label>
      <input id="host" type="text" placeholder="192.168.1.50" autocomplete="off">
    </div>
    <div>
      <label for="port">Port</label>
      <input id="port" type="number" value="80" min="1" max="65535">
    </div>
  </div>

  <div class="error" id="error"></div>
  <button id="continue">Test connection</button>

  <script>
    const $host = document.getElementById('host');
    const $port = document.getElementById('port');
    const $btn  = document.getElementById('continue');
    const $err  = document.getElementById('error');

    Homey.setTitle('CyberQ — Setup');

    $btn.addEventListener('click', async () => {
      $err.textContent = '';
      const host = $host.value.trim();
      const port = parseInt($port.value, 10) || 80;
      if (!host) { $err.textContent = 'IP address is required.'; return; }

      $btn.disabled = true;
      $btn.textContent = 'Testing…';
      try {
        await Homey.emit('configure', { host, port });
        await Homey.nextView();
      } catch (err) {
        $err.textContent = err.message || String(err);
        $btn.disabled = false;
        $btn.textContent = 'Test connection';
      }
    });

    $host.focus();
  </script>
</body>
</html>
